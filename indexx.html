<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto & Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div class="max-w-md mx-auto p-4">
        <header class="mb-6">
            <h1 class="text-2xl font-bold">Финансовый Трекер</h1>
            <p class="text-sm text-gray-500">Учебный проект для преподавателя</p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <span class="text-xs text-gray-400 uppercase font-bold">Bitcoin</span>
                <div id="btc-price" class="text-lg font-mono font-bold text-orange-500">Загрузка...</div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <span class="text-xs text-gray-400 uppercase font-bold">USD / KZT</span>
                <div id="usd-price" class="text-lg font-mono font-bold text-blue-600">450.5</div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <h2 class="text-sm font-bold mb-4">Динамика (7 дней)</h2>
            <canvas id="myChart"></canvas>
        </div>

        <div class="space-y-2">
            <h2 class="text-sm font-bold text-gray-400 uppercase">О проекте</h2>
            <div class="bg-white p-3 rounded-xl text-sm border border-gray-100">
                🚀 Использует CoinGecko API
            </div>
            <div class="bg-white p-3 rounded-xl text-sm border border-gray-100">
                📱 Оптимизировано для Mobile
            </div>
        </div>
    </div>

    <script>
        // Логика получения данных
        async function fetchData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7&interval=daily');
                const data = await response.json();
                
                const prices = data.prices.map(p => p[1]);
                const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString('ru-RU', {weekday: 'short'}));

                // Обновляем текущую цену
                document.getElementById('btc-price').innerText = '$' + prices[prices.length - 1].toLocaleString(undefined, {maximumFractionDigits: 0});

                // Рисуем график
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'BTC Price',
                            data: prices,
                            borderColor: '#f97316',
                            borderWidth: 2,
                            fill: true,
                            backgroundColor: 'rgba(249, 115, 22, 0.05)',
                            tension: 0.4,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false } },
                            y: { ticks: { display: false }, grid: { display: false } }
                        }
                    }
                });
            } catch (e) {
                console.error("Ошибка сети");
            }
        }

        fetchData();
    </script>
</body>
</html>
